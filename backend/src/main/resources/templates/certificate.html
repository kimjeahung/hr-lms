<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교육 이수증</title>
  <style>
    @page { size: A4; margin: 0; }
    * { box-sizing: border-box; }
    html, body { width: 210mm; height: 297mm; margin: 0; padding: 0; }
    body {
      padding: 10mm;
      background: #f3f4f6;
      font-family: "KoreanEmbedded","KoreanFallback","Noto Sans CJK KR","Noto Sans KR","Malgun Gothic","NanumGothic",sans-serif;
      color: #111827;
    }
    .certificate {
      width: 190mm; height: 277mm; margin: 0 auto;
      background: #ffffff; padding: 10mm;
      border: 14px solid #1f2937; position: relative; overflow: hidden;
    }
    .certificate::before {
      content: ""; position: absolute; top: 18px; left: 18px; right: 18px; bottom: 18px;
      border: 2px solid #9ca3af; pointer-events: none;
    }
    .certificate-inner { position: relative; z-index: 1; height: 100%; padding: 8mm 10mm; }
    .certificate-no { text-align: right; font-size: 15px; color: #4b5563; margin-bottom: 28px; }
    .title-area { text-align: center; margin-bottom: 48px; }
    .sub-title { font-size: 18px; letter-spacing: 6px; color: #6b7280; margin-bottom: 12px; }
    .main-title { font-size: 44px; font-weight: 800; letter-spacing: 10px; margin: 0; }
    .info-box {
      width: 78%; margin: 0 auto 44px;
      border-top: 2px solid #111827; border-bottom: 2px solid #111827; padding: 24px 10px;
    }
    .info-row { display: flex; align-items: center; min-height: 36px; font-size: 18px; }
    .info-row.course-row { align-items: flex-start; }
    .info-label { width: 150px; font-weight: 700; color: #374151; }
    .info-value { flex: 1; font-weight: 500; }
    .course-title { display: block; white-space: normal; word-break: keep-all; overflow-wrap: anywhere; line-height: 1.45; }
    .course-title.limit-2 {
      display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2;
      line-clamp: 2; max-height: 2.9em; overflow: hidden; text-overflow: ellipsis;
    }
    .course-title.compact { font-size: 17px; }
    .course-title.compact-2 { font-size: 15px; line-height: 1.35; }
    .content { width: 84%; margin: 0 auto; font-size: 19px; line-height: 1.7; text-align: center; word-break: keep-all; }
    .content .course-title { display: inline; }
    .content .course-title.compact { font-size: 18px; }
    .content .course-title.compact-2 { font-size: 16px; }
    .date { margin-top: 26px; text-align: center; font-size: 18px; font-weight: 600; }
    .issuer { margin-top: 28px; display: flex; align-items: center; justify-content: center; gap: 20px; }
    .issuer-name { font-size: 24px; font-weight: 800; letter-spacing: 2px; }
    .stamp-img { width: 130px; height: 130px; display: block; }
    .footer {
      position: absolute; left: 16mm; right: 16mm; bottom: 12mm;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; color: #6b7280;
    }
  </style>
</head>
<body>
<div class="certificate">
  <div class="certificate-inner">
    <div class="certificate-no">증서번호: <span th:text="${certificateNo}"></span></div>
    <div class="title-area">
      <div class="sub-title">EDUCATION CERTIFICATE</div>
      <h1 class="main-title">이 수 증</h1>
    </div>
    <div class="info-box">
      <div class="info-row"><div class="info-label">성명</div><div class="info-value" th:text="${userName}"></div></div>
      <div class="info-row"><div class="info-label">소속</div><div class="info-value" th:text="${department}"></div></div>
      <div class="info-row course-row">
        <div class="info-label">교육명</div>
        <div class="info-value">
          <span class="course-title"
            th:classappend="${#strings.length(courseTitle) > 36} ? (${#strings.length(courseTitle) > 56} ? ' compact-2 limit-2' : ' compact limit-2') : ''"
            th:text="${#strings.length(courseTitle) > 72 ? #strings.substring(courseTitle, 0, 72) + '...' : courseTitle}"></span>
        </div>
      </div>
      <div class="info-row"><div class="info-label">교육기간</div><div class="info-value"><span th:text="${startDate}"></span> ~ <span th:text="${endDate}"></span></div></div>
      <div class="info-row"><div class="info-label">교육시간</div><div class="info-value"><span th:text="${trainingHours}"></span>시간</div></div>
    </div>
    <div class="content">
      위 사람은 <strong><span class="course-title"
        th:classappend="${#strings.length(courseTitle) > 36} ? (${#strings.length(courseTitle) > 56} ? ' compact-2' : ' compact') : ''"
        th:text="${#strings.length(courseTitle) > 56 ? #strings.substring(courseTitle, 0, 56) + '...' : courseTitle}"></span></strong> 교육과정을 성실히 이수하였기에
      관계 규정 및 교육 운영 기준에 따라 이 증서를 수여합니다.
    </div>
    <div class="date" th:text="${issuedAt}"></div>
    <div class="issuer">
      <span class="issuer-name" th:text="${issuerName}"></span>
