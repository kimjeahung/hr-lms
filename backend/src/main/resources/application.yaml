server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate   # 프로덕션에서 스키마 자동 변경 방지. 로컬은 application-local.yaml이 update로 오버라이드
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 500MB    # 영상 대용량 업로드는 별도 스트리밍 엔드포인트 사용 권장
      max-request-size: 500MB

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3005,http://192.168.2.46:3005}

ai:
  server:
    url: ${AI_SERVER_URL:http://localhost:5000}
  connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:5000}    # Flask 연결 타임아웃 (5초)
  read-timeout-ms: ${AI_READ_TIMEOUT_MS:20000}          # LLM 응답 대기 타임아웃 (20초)

certificate:
  storage-path: ${CERTIFICATE_STORAGE_PATH:/app/certificates}
  n8n-webhook-url: ${BACKEND_N8N_TRIGGER_URL:${N8N_WEBHOOK_URL:}}
  trigger-enabled: ${CERTIFICATE_TRIGGER_ENABLED:true}
  issuer-name: ${CERTIFICATE_ISSUER_NAME:인사하는 인사팀}

video:
  storage-path: ${VIDEO_STORAGE_PATH:/app/videos}
  base-url: ${VIDEO_BASE_URL:/api/user/videos}