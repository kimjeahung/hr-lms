server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

ai:
  server:
    url: ${AI_SERVER_URL:http://localhost:5000}

certificate:
  storage-path: ${CERTIFICATE_STORAGE_PATH:/app/certificates}
  n8n-webhook-url: ${BACKEND_N8N_TRIGGER_URL:${N8N_WEBHOOK_URL:}}
  trigger-enabled: ${CERTIFICATE_TRIGGER_ENABLED:true}
  issuer-name: ${CERTIFICATE_ISSUER_NAME:인사하는 인사팀}

video:
  storage-path: ${VIDEO_STORAGE_PATH:/app/videos}
  base-url: ${VIDEO_BASE_URL:/api/user/videos}

spring:
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB