name: hr-lms-app

services:
  mysql:
    image: mysql:8.0
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lms}
      MYSQL_USER: ${MYSQL_USER:-lms_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - "./LMS_DB ver 1.0.1.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${FRONTEND_HTTP_PORT:-3005}:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    ports:
      - "${BACKEND_HTTP_PORT:-8085}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      ai:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      AI_SERVER_URL: ${AI_SERVER_URL:-http://ai:5000}
      JWT_SECRET: ${JWT_SECRET}
      CERTIFICATE_INTERNAL_API_TOKEN: ${CERTIFICATE_INTERNAL_API_TOKEN}
      CERTIFICATE_STORAGE_PATH: ${CERTIFICATE_STORAGE_PATH:-/app/certificates}
      BACKEND_N8N_TRIGGER_URL: ${BACKEND_N8N_TRIGGER_URL:-http://n8n:5678/webhook/certificate}
      CERTIFICATE_ISSUER_NAME: ${CERTIFICATE_ISSUER_NAME:-인사하는 인사팀}
      VIDEO_STORAGE_PATH: ${VIDEO_STORAGE_PATH:-/app/videos}
      VIDEO_BASE_URL: ${VIDEO_BASE_URL:-/api/user/videos}
    volumes:
      - certificate-storage:/app/certificates
      - video-storage:/app/videos
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai:
    build: ./ai
    ports:
      - "${AI_HTTP_PORT:-5005}:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "${N8N_HTTP_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      N8N_HOST: ${N8N_HOST:-0.0.0.0}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_PUBLIC_WEBHOOK_BASE_URL:-http://192.168.2.46:5678}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me-32-char-encryption-key}
      CERTIFICATE_INTERNAL_API_TOKEN: ${CERTIFICATE_INTERNAL_API_TOKEN}
      GENERIC_TIMEZONE: Asia/Seoul
      TZ: Asia/Seoul
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  dozzle:
    image: amir20/dozzle:latest
    ports:
      - "${DOZZLE_HTTP_PORT:-9999}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
    restart: unless-stopped

volumes:
  mysql-data:
  n8n_data:
  certificate-storage:
  video-storage: